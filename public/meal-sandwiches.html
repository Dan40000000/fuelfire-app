<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Wraps - FuelFire</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .meal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .meal-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        
        .meal-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        
        .meal-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #00C9A7, #4FD1C7);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .meal-image.has-photo {
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3));
        }
        
        .meal-image.has-photo .category-icon {
            display: none;
        }
        
        .difficulty-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .meal-content {
            padding: 20px;
        }
        
        .meal-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        
        .meal-description {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        
        .meal-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .meal-time {
            color: #28a745;
            font-size: 13px;
            font-weight: 600;
        }
        
        .rating-stars {
            color: #ff9500;
            font-size: 14px;
        }
        
        .meal-nutrition {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .nutrition-item {
            text-align: center;
            background: #f0fdfa;
            padding: 8px 4px;
            border-radius: 8px;
        }
        
        .nutrition-value {
            font-weight: bold;
            color: #00C9A7;
            font-size: 14px;
        }
        
        .nutrition-label {
            font-size: 11px;
            color: #666;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
        }

        .modal-content {
            background-color: white;
            margin: 10px;
            padding: 0;
            border-radius: 20px;
            max-width: 500px;
            margin: 20px auto;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            background: linear-gradient(135deg, #00C9A7, #4FD1C7);
            color: white;
            padding: 20px;
            border-radius: 20px 20px 0 0;
            position: relative;
        }

        .close-modal {
            color: white;
            float: right;
            font-size: 28px;
            font-weight: bold;
            background: none;
            border: none;
            cursor: pointer;
            position: absolute;
            right: 15px;
            top: 15px;
        }

        .modal-body {
            padding: 20px;
        }

        .ingredient-list {
            margin: 15px 0;
        }

        .ingredient-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            padding: 5px 0;
        }

        .ingredient-checkbox {
            margin-right: 10px;
        }

        .instruction-list {
            margin: 15px 0;
        }

        .instruction-item {
            margin-bottom: 12px;
            padding: 10px;
            background: #f0fdfa;
            border-radius: 8px;
            border-left: 4px solid #00C9A7;
        }

        .log-recipe-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            font-size: 14px;
        }

        .fusion-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
        }
    </style>
</head>

        function generateDifficultyStars(difficulty) {
            var filledStars = '★'.repeat(difficulty);
            var emptyStars = '☆'.repeat(5 - difficulty);
            return filledStars + emptyStars;
        }

        function generateRatingStars(rating) {
            var filledStars = '★'.repeat(rating);
            var emptyStars = '☆'.repeat(5 - rating);
            return filledStars + emptyStars;
        }

            var ingredientsHtml = '<h3 style="color: #00C9A7; margin-bottom: 15px;">🛒 Shopping List</h3><div class="ingredient-list">';
            for (var i = 0; i < meal.ingredients.length; i++) {
                var ingredient = meal.ingredients[i];
                ingredientsHtml += 
                    '<div class="ingredient-item">' +
                        '<input type="checkbox" class="ingredient-checkbox">' +
                        '<span>' + ingredient + '</span>' +

            var instructionsHtml = '<h3 style="color: #00C9A7; margin: 25px 0 15px 0;">👨‍🍳 Instructions</h3><div class="instruction-list">';

                var instruction = meal.instructions[i];
                instructionsHtml +=

        function logRecipe(index) {
            var meal = sandwichRecipes[index];
            var today = new Date().toISOString().split('T')[0];
            
            // Get existing logged meals
            var loggedMeals = JSON.parse(localStorage.getItem('fuelfire_logged_meals') || '{}');
            
            if (!loggedMeals[today]) {
                loggedMeals[today] = {
                    meals: [],
                    totalCalories: 0
                }
            }
            
            // Add this recipe
            loggedMeals[today].meals.push({
                name: meal.name,
                calories: meal.calories,
                protein: meal.protein,
                carbs: meal.carbs,
                fat: meal.fat,
                time: new Date().toISOString(),
                fromRecipe: true,
                category: 'sandwich'
            }
            
            loggedMeals[today].totalCalories += meal.calories;
            
            // Save to localStorage
            localStorage.setItem('fuelfire_logged_meals', JSON.stringify(loggedMeals));
            
            // Show success message
            alert('✅ ' + meal.name + ' logged! (+' + meal.calories + ' calories)');
            closeModal();
        }

        // Click outside modal to close
        window.onclick = function(event) {
            var modal = document.getElementById('recipe-modal');
            if (event.target == modal) {
                closeModal();
            }
        }

        // Initialize
        window.addEventListener('load', function() {
            updateTime();
            setInterval(updateTime, 1000);
            displayMeals();
        }
    </script>
</body>
</html>
